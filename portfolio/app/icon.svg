<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Brand Electric Cyan to Neon Violet Gradient -->
    <linearGradient id="logo-gradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#d946ef" />
    </linearGradient>
    <!-- Premium drop shadow & glow -->
    <filter id="premium-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur" />
      <feComponentTransfer in="blur" result="glow1">
        <feFuncA type="linear" slope="0.6" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Sleek premium dark circular background -->
  <rect width="32" height="32" rx="9" fill="#0d0c15" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1" />
  
  <!-- Stylized geometric "◢" brand mark with glow -->
  <path d="M 8,24 L 24,24 L 24,8 Z" fill="url(#logo-gradient)" filter="url(#premium-glow)" />
</svg>
